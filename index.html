<!DOCTYPE html>
<html>
<head>
<title>For Shaista ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  overflow-x: hidden;
}

/* INTRO SCREEN */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  cursor: pointer;
  z-index: 10;
}

/* MAIN CONTENT */
#main {
  display: none;
  padding: 20px;
}

h1 {
  font-size: 40px;
}

/* GALLERY */
.gallery img {
  width: 200px;
  margin: 10px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 15px white;
}

.gallery img:hover {
  transform: scale(1.1);
}

/* MESSAGE */
#message {
  max-width: 800px;
  margin: 30px auto;
  font-size: 18px;
  line-height: 1.6;
  white-space: pre-line;
}

/* HEARTS */
.heart {
  position: fixed;
  color: pink;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* MUSIC BUTTON */
#musicBtn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: white;
  color: black;
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="intro" onclick="start()">🎁 Click to Open Your Gift</div>

<div id="main">
<button id="musicBtn" onclick="toggleMusic()">🎵 Play Music</button>

<h1>Happy Birthday Shaista ❤️</h1>

<div class="gallery">
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">
  <img src="photo4.jpg">
</div>

<div id="message"></div>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function start() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";
  type();
}

/* MESSAGE */
const text = `HAPPY BIRTHDAY MY LOVE SHAISTAAA 😭❤️🫶🏻🎀💫🌸🤍✨🥺💍

28 APRIL…
I swear this date is not just a normal day for me anymore…

Because on this day, MY SHAISTAA was born 😭🤍

The most beautiful soul, the most precious smile 💖

Today you turn 19 🎂🌸

Tum meri mohabbat bhi ho ❤️
Tum meri dua bhi ho 🤲🏻✨

I LOVE YOU SO MUCH SHAAISTAAAA 😭❤️💍✨

ALWAYS AND FOREVER 🫶🏻😭🤍`;

let i = 0;
function type() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 30);
  }
}

/* HEARTS */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);

/* MUSIC */
let playing = false;
function toggleMusic() {
  let music = document.getElementById("music");
  if (!playing) {
    music.play();
    document.getElementById("musicBtn").innerText = "⏸ Pause";
  } else {
    music.pause();
    document.getElementById("musicBtn").innerText = "🎵 Play Music";
  }
  playing = !playing;
}
</script>

</body>
</html>
